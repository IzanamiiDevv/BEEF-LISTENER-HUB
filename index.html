    <title>Origin Encoder</title>

</body>
<script>

function xorEncode(text, key) {
    let result = "";

    for (let i = 0; i < text.length; i++) {
        result += String.fromCharCode(
            text.charCodeAt(i) ^
            key.charCodeAt(i % key.length)
        );
    }

    return btoa(result);
}

</script>
