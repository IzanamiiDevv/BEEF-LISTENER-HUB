<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origin Encoder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a38;
      --accent: #7b6ef6;
      --accent2: #e06cff;
      --text: #f0eeff;
      --muted: #7070a0;
      --success: #4ade80;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(123,110,246,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    /* Header */
    .header {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(123,110,246,0.35);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .tag::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 0.5rem;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea, input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 14px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(123,110,246,0.15);
    }

    textarea::placeholder, input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Output area */
    .output-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      word-break: break-all;
      min-height: 72px;
      line-height: 1.7;
      transition: border-color 0.3s;
      position: relative;
    }

    .output-box.has-value {
      border-color: rgba(123,110,246,0.4);
    }

    .empty-hint {
      color: var(--muted);
      opacity: 0.5;
      font-size: 12px;
    }

    /* Copy button */
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      padding: 12px 22px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      align-self: flex-start;
    }

    .copy-btn:hover { opacity: 0.88; }
    .copy-btn:active { transform: scale(0.97); }

    .copy-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .copy-btn.copied {
      background: linear-gradient(135deg, #1a6e3c, #2da55e);
    }

    /* Footer note */
    .footer-note {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      animation: fadeUp 0.6s 0.2s ease both;
      margin-top: 1rem;
    }

    .footer-note::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="tag">XOR Cipher</div>
      <h1>Origin Encoder</h1>
      <p class="subtitle">// encode text with a symmetric xor key</p>
    </div>

    <div class="card">
      <div class="field">
        <label for="inputText">Input text</label>
        <textarea id="inputText" placeholder="Paste your plaintext here…"></textarea>
      </div>

      <div class="field">
        <label for="inputKey">Secret key</label>
        <input type="text" id="inputKey" placeholder="Enter encryption key…" />
      </div>

      <div class="divider"><span>encoded output</span></div>

      <div class="field">
        <div class="output-label-row">
          <label>Result</label>
        </div>
        <div class="output-box" id="outputBox">
          <span class="empty-hint">Output will appear here…</span>
        </div>
      </div>

      <button class="copy-btn" id="copyBtn" onclick="copyOutput()">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy to clipboard
      </button>
    </div>

    <p class="footer-note">Output is base64-encoded XOR cipher — symmetric, use the same key to decode.</p>
  </div>

  <script>
    function xorEncode(text, key) {
      let result = "";
      for (let i = 0; i < text.length; i++) {
        result += String.fromCharCode(
          text.charCodeAt(i) ^ key.charCodeAt(i % key.length)
        );
      }
      return btoa(result);
    }

    function updateOutput() {
      const text = document.getElementById("inputText").value;
      const key  = document.getElementById("inputKey").value;
      const box  = document.getElementById("outputBox");

      if (!text || !key) {
        box.innerHTML = '<span class="empty-hint">Output will appear here…</span>';
        box.classList.remove("has-value");
      } else {
        box.textContent = xorEncode(text, key);
        box.classList.add("has-value");
      }
    }

    function copyOutput() {
      const box = document.getElementById("outputBox");
      const btn = document.getElementById("copyBtn");
      if (box.classList.contains("has-value")) {
        navigator.clipboard.writeText(box.textContent).then(() => {
          btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
          btn.classList.add("copied");
          setTimeout(() => {
            btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy to clipboard`;
            btn.classList.remove("copied");
          }, 2200);
        });
      }
    }

    document.getElementById("inputText").addEventListener("input", updateOutput);
    document.getElementById("inputKey").addEventListener("input", updateOutput);
  </script>
</body>
</html>
